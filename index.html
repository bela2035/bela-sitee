    color: white;
}

.header {
    position: relative;
    text-align: center;
    padding-bottom: 60px;
}

.banner {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
}

.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #00eaff;
    box-shadow: 0 0 25px #00eaff;
    object-fit: cover;
    position: absolute;
    left: 50%;
    bottom: -70px;
    transform: translateX(-50%);
}

.channel-name {
    margin-top: 80px;
    font-size: 32px;
    font-weight: bold;
    color: #00eaff;
}

.channel-desc {
    color: #aaa;
    font-size: 14px;
    margin-top: 5px;
}

.subscribe-button {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background-color: #FF0000;
    border-radius: 6px;
    text-decoration: none;
    transition: 0.3s;
}

.subscribe-button:hover {
    background-color: #cc0000;
    transform: scale(1.05);
}

.videos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    padding: 40px;
}

.video-card {
    background: #1a1a2e;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 0 10px #000;
}

.video-card:hover {
    transform: scale(1.07);
    box-shadow: 0 0 20px #00eaff;
}

.thumbnail {
    width: 100%;
}

.video-title {
    padding: 12px;
    font-size: 15px;
}

a {
    text-decoration: none;
    color: white;
}

@media (max-width: 600px) {
    .channel-name { font-size: 24px; }
    .profile { width: 100px; height: 100px; bottom: -50px; }
}
</style>
